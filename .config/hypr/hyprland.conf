
debug {
  disable_logs = false
}

monitor = , preferred, auto, auto
#monitor = DP-1, disable
#monitor = DP-2, disable
#monitor = DP-3, disable

monitor = desc:BOE NE135A1M-NY1, 2880x1920, auto, 2
monitor = desc:Lenovo Group Limited P27h-20, 2560x1440, auto, 1
monitor = desc:Crestron Electronics Inc. AirMedia, 1440x960, auto, 1, mirror, eDP-1
monitor = desc:Crestron Electronics Inc. Crestron, 1440x960, auto, 1, mirror, eDP-1
monitor = desc:HP Inc. HP Z32, 3840x2160, auto, 1
monitor = desc:ZPR Paper Monitor, preferred, auto, 1

workspace = 1, monitor:eDP-1
workspace = 2, monitor:eDP-1
workspace = 3, monitor:eDP-1
workspace = 4, monitor:eDP-1
workspace = 5, monitor:eDP-1
workspace = 6, monitor:eDP-1
workspace = 7, monitor:eDP-1
workspace = 8, monitor:eDP-1
workspace = 0, monitor:eDP-1
workspace = 9, monitor:desc:ZPR Paper Monitor

bindl=,switch:off:Lid Switch,exec,~/.local/bin/clamshell-mode.sh open
bindl=,switch:on:Lid Switch,exec,~/.local/bin/clamshell-mode.sh close

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = hyprpm reload -n
exec-once = hypridle
exec-once = dunst
exec-once = waybar 
exec-once = swaybg --mode fit --image ~/Pictures/framework-wallpaper-pack/Framework\ Laptop\ 13\ Pro\ Wallpapers/FW\ 13\ Pro\ Wallpaper\ 6\ -\ updated.png

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

general {
    gaps_in = 5
    gaps_out = 0
    border_size = 4
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    resize_on_border = true
    allow_tearing = false
}

decoration {
    rounding = 0

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

dwindle {
    preserve_split = true
    force_split = 2
}

group {
    group_on_movetoworkspace = true
    groupbar {
        render_titles = false
        indicator_height = 0
        indicator_gap = 4
        height = 4
        gaps_in = 4
        gaps_out = 0
        col.active = rgba(33ccffcc)
        col.inactive = rgba(303030cc)
        gradients = true
        gradient_rounding = 2
        gradient_round_only_edges = false
        blur = true
    }
}

animations {
    enabled = no
}


# "Smart gaps" / "No gaps when only"
workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0
windowrule = border_size 0, match:float 0, match:workspace w[tv1]

misc {
    force_default_wallpaper = 1 
    disable_hyprland_logo = true 
    focus_on_activate = false
}

input {
    kb_layout = us
    kb_variant = intl
    kb_model =
    kb_options =
    kb_rules =
    follow_mouse = 1
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
    touchpad {
        natural_scroll = false
    }
}

device {
    name = ahokore-v2-keyboard
    kb_layout = us
    kb_variant = intl
}

scrolling {
  column_width = 0.96
  focus_fit_method = 0 # center
}

gesture = 3, horizontal, workspace


bind = SUPER, backspace, killactive,
bind = SUPER AlT, E, exit,
bind = SUPER, s, togglefloating
bind = SUPER, f, exec, rofi -show combi 
bind = SUPER, g, exec, ~/.local/bin/launch-walker 

bind = SUPER, b, exec, ~/.local/bin/bzmenu --launcher walker 
bind = SUPER ALT, b, exec, ~/.local/bin/rofi-wayland-bluetooth
bind = SUPER, q, exec, ~/.local/bin/rofi-network-manager
bind = SUPER, c, exec, playerctl --all-players play-pause
bind = SUPER, v, exec, grim -g "$(slurp)" -  | magick convert -shave 2x2 - - | swappy -f -
bind = SUPER ALT, v, exec, grim -g "$(slurp)" -  | magick convert -shave 2x2 -trim - - | swappy -f -

bind = SUPER, semicolon, workspace, previous
bind = SUPER, w, togglegroup

bind = SUPER, h, exec, ~/.config/hypr/scripts/movefocus.sh l
bind = SUPER, j, movefocus, d
bind = SUPER, l, exec, ~/.config/hypr/scripts/movefocus.sh r
bind = SUPER, k, movefocus, u

bind = SUPER SHIFT, h, movewindoworgroup, l
bind = SUPER SHIFT, j, movewindoworgroup, d
bind = SUPER SHIFT, k, movewindoworgroup, u
bind = SUPER SHIFT, l, movewindoworgroup, r

bind = SUPER SHIFT, o, moveoutofgroup

bind = SUPER ALT, h, movegroupwindow, l
bind = SUPER ALT, j, movegroupwindow, d
bind = SUPER ALT, k, movegroupwindow, u
bind = SUPER ALT, l, movegroupwindow, r

bind = SUPER, 1, workspace, 1 
bind = SUPER, 2, workspace, 2 
bind = SUPER, 3, workspace, 3 
bind = SUPER, 4, workspace, 4 
bind = SUPER, 5, workspace, 5 
bind = SUPER, 6, workspace, 6 
bind = SUPER, 7, workspace, 7 
bind = SUPER, 8, workspace, 8 
bind = SUPER, 9, workspace, 9 
bind = SUPER, 0, workspace, 10 

bind = SUPER, y, workspace, 1
bind = SUPER, u, workspace, 2
bind = SUPER, i, workspace, 3
bind = SUPER, o, workspace, 4
bind = SUPER, p, workspace, 5
bind = SUPER, n, workspace, 6
bind = SUPER, m, workspace, 7
bind = SUPER, comma, workspace, 8
bind = SUPER, period, workspace, 9
bind = SUPER, slash, workspace, 10

bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

bind = SUPER SHIFT, y, movetoworkspace, 1
bind = SUPER SHIFT, u, movetoworkspace, 2
bind = SUPER SHIFT, i, movetoworkspace, 3
bind = SUPER SHIFT, o, movetoworkspace, 4
bind = SUPER SHIFT, p, movetoworkspace, 5
bind = SUPER SHIFT, n, movetoworkspace, 6
bind = SUPER SHIFT, m, movetoworkspace, 7
bind = SUPER SHIFT, comma, movetoworkspace, 8
bind = SUPER SHIFT, period, movetoworkspace, 9
bind = SUPER SHIFT, slash, movetoworkspace, 10

bind = SUPER, space, togglespecialworkspace, scratchpad
bind = SUPER, escape, togglespecialworkspace, scratchpad2

bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 10%-
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

binds {
  allow_workspace_cycles = true
}

windowrule {
  name = Papers
  match:class = org.gnome.Papers
  fullscreen_state = 0 0
}

windowrule {
  name = orgmode-work
  match:class = orgmode-work
  float = on
  center = on
  size = 1199 897
  border_size = 5
  workspace = special:scratchpad
}

windowrule {
  name = orgmode-personal
  match:class = orgmode-personal
  float = on
  center = on
  size = 1199 897
  border_size = 5
  workspace = special:scratchpad2
}

workspace = 6, layout:scrolling
workspace = 7, layout:monocle

windowrule = center true, match:class jetbrains-.*, match:title splash, match:float true
windowrule = no_focus true, match:class jetbrains-.*, match:title splash, match:float true
windowrule = no_focus true, match:class jetbrains-.*, match:title win.*, match:float true
windowrule = no_blur true, match:class jetbrains-.*, match:float true
windowrule = no_initial_focus true, match:class jetbrains-.*, match:float true
windowrule = opacity 1 override 1 override 1, match:class jetbrains-.*, match:float true
